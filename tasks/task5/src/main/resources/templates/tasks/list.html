<!doctype html>
<html xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Список задач</title>
</head>

<body>
    <div th:replace="~{base :: header}"></div>

    <h1>Список задач</h1>

    <a href="/tasks/new">Добавить задачу</a>
    <br /><br />

    <div th:if="${#lists.isEmpty(items)}">
        <p>Задачи пока не добавлены.</p>
    </div>


    <table th:if="${not #lists.isEmpty(items)}" border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Ответственный</th>
                <th>Название задачи</th>
                <th>Действия</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="task : ${items}">
                <td th:text="${task.id}">ID</td>
                <td><a th:href="@{/users/{id}(id=${task.user.id})}" th:text="${task.user.email}">email</a></td>
                <td th:text="${task.title}">Title</td>
                <td>
                    <a th:href="@{/tasks/{id}(id=${task.id})}">Смотреть</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
