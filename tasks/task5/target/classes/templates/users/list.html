<!doctype html>
<html xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Список пользователей</title>
</head>

<body>
    <div th:replace="~{base :: header}"></div>

    <h1>Список пользователей</h1>

    <a href="/users/new">Добавить пользователя</a>
    <br /><br />

    <div th:replace="~{components/search :: search}"></div>

    <div th:if="${#lists.isEmpty(items)}">
        <p>Не найдено</p>
    </div>


    <table th:if="${not #lists.isEmpty(items)}" border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Действия</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="user : ${items}">
                <td th:text="${user.id}">ID</td>
                <td th:text="${user.email}">Email</td>
                <td>
                    <a th:href="@{/users/{id}(id=${user.id})}">Смотреть</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
