<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Профиль пользователя</title>
</head>

<body>
    <div th:replace="~{base :: header}"></div>

    <p><a href="/users">Назад к списку</a></p>

    <h1>Профиль пользователя</h1>



    <div th:object="${entity}">
        <p>
            <strong>ID:</strong> <span th:text="*{id}">1</span>
        </p>
        <p>
            <strong>Email:</strong> <span th:text="*{email}">Email</span>
        </p>

        <hr>

        <h2>Список задач</h2>
        <div th:if="${#lists.isEmpty(tasks)}">
            <p>Задачи пока не добавлены.</p>
        </div>

        <table th:if="${not #lists.isEmpty(tasks)}" border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название задачи</th>
                    <th>Действия</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="task : ${tasks}">
                    <td th:text="${task.id}">ID</td>
                    <td th:text="${task.title}">Title</td>
                    <td>
                        <a th:href="@{/tasks/{id}(id=${task.id})}">Смотреть</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <hr>

        <h2>Создать задачу пользователю</h2>

        <div th:replace="~{tasks/forms/task :: taskForm(@{/users/{id}(id=*{id})})}"></div>

        <br>

        <a th:href="@{/users/delete/{id}(id=*{id})}">Удалить пользователя</a>
    </div>
</body>

</html>
