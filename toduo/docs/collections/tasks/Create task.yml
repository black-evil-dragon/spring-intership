info:
  name: Create task
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/v1/tasks"
  body:
    type: json
    data: |-
      {
        "name": "Разработать сервис Задачи",
        "status": "AWAIT_WORK",
        "description": "Разработать сервис Задачи. Приложение должно иметь круд операции",
        "authorId": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
