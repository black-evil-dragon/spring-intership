info:
  name: Get column by id and desk id
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/v1/desks/:deskId/columns/:columnId"
  params:
    - name: columnId
      value: "1"
      type: path
    - name: deskId
      value: "2"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
