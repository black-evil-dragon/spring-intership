info:
  name: Update task by id
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{base_url}}/api/v1/tasks/:taskId"
  params:
    - name: taskId
      value: "1"
      type: path
  body:
    type: json
    data: |-
      {
        "authorId": 1,
        "assigneeId": 2,
        "status": "in_work"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
