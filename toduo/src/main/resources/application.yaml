# ================== LOGS SETTINGS ===================== #
logging:
  charset:
    console: UTF-8


# ================== SPRING SETTINGS ===================== #
spring:
  application:
    name: toduo

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true