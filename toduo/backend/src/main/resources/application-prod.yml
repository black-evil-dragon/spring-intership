# ================== SERVER SETTINGS ===================== #
server:
  error:
    include-stacktrace: never
    include-message: always
  port: ${PORT:8080}



# ================== LOGS SETTINGS ===================== #
logging:
  level:
    org.springframework.web: ${DEV_LOG_LEVEL_WEB:INFO}
    com.caselab.api: ${DEV_LOG_LEVEL_APP:INFO}



# ================== SPRING SETTINGS ===================== #
spring:
  # CORE
  config:
    activate:
      on-profile: prod

  application:
    name: toduo-prod

  security:
    enabled: true
  # END CORE



  # DATABASE
#  datasource:
#    url: ${DATABASE_HOST}
#    username: ${DATABASE_USER}
#    password: ${DATABASE_PASSWORD}
#    driver-class-name: org.postgresql.Driver

#  flyway:
#    enabled: true
#    schemas: public
#    locations: classpath:db/migration
#    baseline-on-migrate: true
#    baseline-version: 0

  jpa:
    show-sql: false

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: false
  # END DATABASE
