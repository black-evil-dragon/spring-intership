# ================== LOGS SETTINGS ===================== #
logging:
  charset:
    console: UTF-8


# ================== SPRING SETTINGS ===================== #
spring:
  application:
    name: toduo

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}


# ================== SERVER SETTINGS ===================== #
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# ================== SWAGGER SETTINGS ===================== #
springdoc:
  swagger-ui:
    path: /docs

  api-docs:
    path: /api/v1/docs


jwt:
  secret: ${SECRET_STRING}
